<!DOCTYPE html>
<html>
<head>
<title>Forgot Password - MedAxis</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
    --primary: #0066cc;
    --primary-dark: #004d99;
    --secondary: #00a8e8;
    --accent: #00d4aa;
    --bg-light: #f0f7ff;
    --card-light: #ffffff;
}

body{
    background: linear-gradient(135deg, var(--bg-light) 0%, #e0f0ff 50%, #d0e8ff 100%);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.forgot-card{
    width: 420px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,102,204,0.2);
    border: none;
    background: var(--card-light);
    overflow: hidden;
}

.forgot-header{
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    padding: 35px 20px;
    text-align: center;
    color: white;
}

.forgot-header h2{
    margin: 0;
    font-weight: 700;
    letter-spacing: 2px;
    font-size: 28px;
}

.forgot-header p{
    margin: 10px 0 0;
    opacity: 0.9;
    font-size: 14px;
}

.forgot-body{
    padding: 35px;
    background: var(--card-light);
}

.form-control{
    border-radius: 10px;
    border: 2px solid #e0e8f0;
    padding: 12px 15px;
    font-size: 15px;
    background: #fafbfc;
    transition: all 0.3s;
}

.form-control:focus{
    border-color: var(--primary);
    box-shadow: 0 0 0 0.2rem rgba(0,102,204,0.15);
    background: white;
}

.form-label{
    color: #5a6a7a;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 8px;
}

.btn-reset{
    background: linear-gradient(135deg, #f59e0b, #d97706);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.5px;
    margin-top: 10px;
    color: white;
}

.btn-reset:hover{
    background: linear-gradient(135deg, #d97706, #b45309);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(245,158,11,0.3);
}

.forgot-footer{
    text-align: center;
    padding: 0 35px 35px;
    background: var(--card-light);
}

.forgot-footer a{
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
}

.forgot-footer a:hover{
    color: var(--primary-dark);
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="card forgot-card">
<div class="forgot-header">
<h2>MedAxis</h2>
<p>Recover your password</p>
</div>

<div class="forgot-body">
<form action="ForgotServlet" method="post">

<div class="mb-3">
<label class="form-label">Registered Email</label>
<input type="email" name="email" class="form-control" placeholder="Enter your email" required>
</div>

<div class="mb-3">
<label class="form-label">New Password</label>
<input type="password" name="newpassword" class="form-control" placeholder="Enter new password" required>
</div>

<div class="mb-3">
<label class="form-label">Confirm Password</label>
<input type="password" name="confirmpassword" class="form-control" placeholder="Confirm new password" required>
</div>

<button class="btn btn-reset w-100">Reset Password</button>

</form>
</div>

<div class="forgot-footer">
<a href="index.html">Back to Login</a>
</div>

</div>

</body>
</html>
