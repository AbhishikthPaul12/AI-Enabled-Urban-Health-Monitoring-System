<!DOCTYPE html>
<html>
<head>
<title>MedAxis Health Manager</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
    --primary: #0066cc;
    --primary-dark: #004d99;
    --secondary: #00a8e8;
    --accent: #00d4aa;
    --bg-light: #f0f7ff;
    --card-light: #ffffff;
}

body{
    background: linear-gradient(135deg, var(--bg-light) 0%, #e0f0ff 50%, #d0e8ff 100%);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.login-card{
    width: 420px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,102,204,0.2);
    border: none;
    background: var(--card-light);
    overflow: hidden;
}

.login-header{
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    padding: 40px 20px;
    text-align: center;
    color: white;
}

.login-header h2{
    margin: 0;
    font-weight: 700;
    letter-spacing: 2px;
    font-size: 32px;
}

.login-header p{
    margin: 10px 0 0;
    opacity: 0.9;
    font-size: 14px;
}

.login-body{
    padding: 40px;
    background: var(--card-light);
}

.form-control{
    border-radius: 10px;
    border: 2px solid #e0e8f0;
    padding: 14px 18px;
    font-size: 15px;
    background: #fafbfc;
    transition: all 0.3s;
}

.form-control:focus{
    border-color: var(--primary);
    box-shadow: 0 0 0 0.2rem rgba(0,102,204,0.15);
    background: white;
}

.form-label{
    color: #5a6a7a;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 8px;
}

.btn-login{
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.5px;
    margin-top: 10px;
}

.btn-login:hover{
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0,102,204,0.3);
}

.login-footer{
    text-align: center;
    padding: 0 40px 40px;
    background: var(--card-light);
}

.login-footer a{
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
}

.login-footer a:hover{
    color: var(--primary-dark);
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="card login-card">
<div class="login-header">
<h2>MedAxis</h2>
<p>Health Management System</p>
</div>

<div class="login-body">
<form action="LoginServlet" method="post">
<div class="mb-4">
<label class="form-label fw-semibold text-muted">Email Address</label>
<input name="email" class="form-control" placeholder="Enter your email" required>
</div>

<div class="mb-4">
<label class="form-label fw-semibold text-muted">Password</label>
<input type="password" name="password" class="form-control" placeholder="Enter your password" required>
</div>

<button class="btn btn-login w-100 text-white">Sign In</button>
</form>
</div>

<div class="login-footer">
<a href="register.html">Create Account</a> &nbsp;|&nbsp; <a href="forgot.html">Forgot Password?</a>
</div>
</div>

</body>
</html>
